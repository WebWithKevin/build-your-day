<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Today's day</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fff7ec;
  --ink:#3a2c1e;
  --soft:#7c6b58;
  --card:#ffffff;
  --line:#f0e2cf;
  --accent:#ff6b4a;
  --accent-deep:#e8492a;
  --teal:#1fb5a3;
  --sun:#ffc73a;
  --grape:#7b6cf6;
  --shadow:0 10px 30px rgba(160,110,60,.16);
  --shadow-doing:0 6px 24px rgba(255,107,74,.32);
  --radius-card:22px;
  --radius-btn:999px;
  --display-font:'Fredoka';
  --display-weight:700;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Nunito',sans-serif;
  color:var(--ink);
  background:
    radial-gradient(1200px 580px at 50% -8%, rgba(255,199,58,.45), transparent 60%),
    radial-gradient(900px 540px at 110% 10%, rgba(255,107,74,.20), transparent 55%),
    radial-gradient(800px 540px at -10% 30%, rgba(31,181,163,.18), transparent 55%),
    var(--bg);
  min-height:100vh;
  padding:24px 20px 80px;
}
.wrap{max-width:1400px;margin:0 auto}

/* ===== header with date tile + title + circular progress ===== */
.header-card{
  background:var(--card);border:2px solid var(--line);border-radius:var(--radius-card);
  padding:20px 24px;box-shadow:var(--shadow);margin:0 0 22px;
  display:grid;grid-template-columns:auto 1fr auto;gap:24px;align-items:center;
  animation:drop .6s cubic-bezier(.2,.9,.3,1.2) both;
}
.date-tile{
  width:88px;flex:none;border:2px solid var(--accent);border-radius:14px;overflow:hidden;
  background:#fff;box-shadow:0 4px 12px rgba(232,73,42,.18);text-align:center;
}
.dt-dow{
  background:var(--accent);color:#fff;font-family:var(--display-font);font-weight:var(--display-weight);
  font-size:.82rem;padding:5px 0;letter-spacing:.14em;
}
.dt-num{font-family:var(--display-font);font-weight:700;font-size:2.4rem;line-height:1;margin:6px 0 0;color:var(--ink)}
.dt-mon{font-family:var(--display-font);font-weight:600;font-size:.85rem;color:var(--soft);letter-spacing:.14em;padding:0 0 8px}
.header-text{min-width:0}
.kicker{font-family:var(--display-font);font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-deep);font-size:.78rem}
h1{font-family:var(--display-font);font-weight:var(--display-weight);font-size:clamp(2rem,4.5vw,2.6rem);margin:.1em 0 .05em;line-height:1.05;display:flex;align-items:center;gap:12px}
h1 .kemoji{font-size:.95em}
.subtitle{color:var(--soft);font-weight:700;font-size:1rem}
.subtitle .wknum{display:inline-block;background:var(--line);color:var(--soft);padding:2px 10px;border-radius:999px;font-size:.78rem;font-weight:800;margin-left:8px}
.prog-ring-wrap{flex:none;display:flex;flex-direction:column;align-items:center;gap:4px}
.prog-ring{width:96px;height:96px}
.prog-ring text{font-family:var(--display-font);font-weight:700;fill:var(--ink)}
.prog-ring .ring-bg{stroke:var(--line)}
.prog-ring .ring-fill{stroke:var(--teal);transition:stroke-dashoffset .4s ease}
.prog-ring-label{font-family:var(--display-font);font-weight:600;color:var(--soft);font-size:.78rem;letter-spacing:.08em;text-transform:uppercase}

/* ===== goal card — prominent ===== */
.goal-card{
  background:linear-gradient(135deg, #fffbe9 0%, #fff3d0 100%);
  border:3px solid var(--sun);border-radius:var(--radius-card);
  padding:22px 26px;box-shadow:0 10px 30px rgba(255,199,58,.25);margin:0 0 22px;
  position:relative;overflow:hidden;
}
.goal-card.completed{background:linear-gradient(135deg,#e6fbf4 0%,#c5f0e0 100%);border-color:var(--teal)}
.goal-card.completed::after{content:"✓ Goal complete!";position:absolute;top:14px;right:18px;background:var(--teal);color:#fff;font-family:var(--display-font);font-weight:700;font-size:.8rem;padding:4px 12px;border-radius:999px}
.goal-label{font-family:var(--display-font);font-weight:600;color:#8c6300;font-size:.85rem;text-transform:uppercase;letter-spacing:.12em;display:flex;align-items:center;gap:6px}
.goal-headline{font-family:var(--display-font);font-weight:var(--display-weight);font-size:1.5rem;color:var(--ink);margin:8px 0;line-height:1.2}
.goal-explainer{color:#5a4300;font-weight:700;font-size:1rem;line-height:1.45;margin-bottom:10px}
.starter-idea{display:flex;gap:10px;background:rgba(255,255,255,.65);border:1.5px dashed var(--sun);border-radius:14px;padding:10px 14px;margin-top:12px;font-size:.95rem;font-weight:700;color:#5a4300}
.starter-idea .si-label{flex:none;font-family:var(--display-font);font-weight:700;color:#8c6300;font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;align-self:flex-start;margin-top:2px}
.starter-idea .si-body{flex:1;line-height:1.45}
.theme-chip{display:inline-block;background:var(--sun);color:#5a4300;font-weight:800;padding:2px 10px;border-radius:999px;font-size:.78rem;margin-top:8px}

/* ===== sections ===== */
.section{margin:0 0 22px;background:var(--card);border:2px solid var(--line);border-radius:var(--radius-card);padding:20px 22px 16px;box-shadow:var(--shadow)}
.section h2{font-family:var(--display-font);font-weight:var(--display-weight);font-size:1.25rem;margin:0;display:flex;align-items:center;gap:10px}
.section .hint{color:var(--soft);font-weight:700;font-size:.9rem;margin:6px 0 14px}
.section .h2-row{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:10px;margin:0}
#now-display{font-family:var(--display-font);font-weight:600;color:var(--soft);font-size:.9rem;background:rgba(239,68,68,.08);padding:3px 11px;border-radius:999px;border:1.5px solid rgba(239,68,68,.25)}

/* ===== progress bars ===== */
.progress{display:flex;align-items:center;gap:12px;font-family:var(--display-font);font-weight:600;color:var(--soft);font-size:.85rem;margin:4px 0 16px}
.progress .bar{flex:1;height:9px;background:var(--line);border-radius:999px;overflow:hidden}
.progress .bar-fill{height:100%;background:var(--teal);width:0%;transition:width .35s ease}
.progress .label{flex:none;min-width:90px;text-align:right}

/* ===== anchor cards (unified card layout) ===== */
.anchor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.anchor{
  position:relative;
  background:#fffdf8;border:2px solid var(--line);border-radius:14px;
  padding:12px 14px;cursor:pointer;display:flex;flex-direction:column;gap:8px;
  transition:transform .12s, border-color .12s, background .12s, box-shadow .15s;
}
.anchor:hover{transform:translateY(-1px);border-color:var(--accent)}
.anchor.done{background:#f0fbf7;border-color:var(--teal)}
.anchor.current{border-color:#ef4444;background:rgba(239,68,68,.06);animation:pulse 2s ease-in-out infinite}
.anchor.current::before{
  content:"🔴 NOW";position:absolute;top:-10px;right:10px;
  background:#ef4444;color:#fff;font-size:.62rem;font-weight:800;
  padding:2px 8px;border-radius:6px;letter-spacing:.04em;z-index:2;
}
.anchor.next{border-color:var(--sun)}
.anchor.next::before{
  content:"NEXT UP";position:absolute;top:-10px;right:10px;
  background:var(--sun);color:#5a4300;font-size:.62rem;font-weight:800;
  padding:2px 8px;border-radius:6px;letter-spacing:.04em;z-index:2;
}
.anchor .a-head{display:flex;align-items:center;gap:8px;font-family:var(--display-font);font-weight:600;color:var(--soft);font-size:.82rem}
.anchor .a-head .ic{font-size:1.15rem;color:var(--ink)}
.anchor .a-head .a-time{flex:1;letter-spacing:.02em}
.anchor .a-head .check{
  flex:none;width:22px;height:22px;border:2.5px solid var(--soft);border-radius:6px;
  display:grid;place-items:center;background:#fff;transition:background .12s, border-color .12s;
}
.anchor.done .a-head .check{background:var(--teal);border-color:var(--teal)}
.anchor.done .a-head .check::after{content:"\2713";color:#fff;font-weight:900;font-size:.95rem}
.anchor .a-title{font-weight:800;font-size:1rem;color:var(--ink);line-height:1.3}
.anchor .a-tags{display:flex;flex-wrap:wrap;gap:6px}
.anchor .a-tags:empty{display:none}
.anchor .a-footer{margin-top:auto;padding-top:6px;display:flex;flex-wrap:wrap;gap:8px}
.anchor .a-footer:empty{display:none}
.tag{font-size:.7rem;padding:3px 10px;border-radius:999px;font-weight:800;background:#fff3d6;color:#8c6300;white-space:nowrap}

/* link buttons (used on anchor + work cards) */
.link-btn{
  font-size:.78rem;font-weight:800;text-decoration:none;
  background:#fff;border:1.5px solid var(--teal);color:var(--teal);
  padding:5px 11px;border-radius:8px;transition:background .12s,color .12s,transform .1s;
  display:inline-flex;align-items:center;gap:5px;white-space:nowrap;
}
.link-btn:hover{background:var(--teal);color:#fff;transform:translateY(-1px)}
.help-btn{
  background:#fff;border:1.5px solid var(--accent);color:var(--accent);
  padding:5px 11px;border-radius:8px;font-family:'Nunito';font-weight:800;font-size:.78rem;
  cursor:pointer;transition:background .12s,color .12s,transform .1s;
}
.help-btn:hover{background:var(--accent);color:#fff;transform:translateY(-1px)}

/* ===== kanban ===== */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start}
.col{background:#fffdf8;border:2px dashed var(--line);border-radius:18px;padding:12px;min-height:180px;display:flex;flex-direction:column}
.col h3{font-family:var(--display-font);font-weight:var(--display-weight);font-size:1.02rem;margin:2px 4px 12px;display:flex;align-items:center;gap:8px;color:var(--ink)}
.col[data-col="doing"]{border-color:var(--accent);background:rgba(255,107,74,.08);border-style:solid;border-width:3px}
.col[data-col="done"]{border-color:var(--teal);background:rgba(31,181,163,.06)}
.col-body{display:flex;flex-direction:column;gap:10px;min-height:80px;flex:1}

.card{
  position:relative;
  background:#fff;border:2.5px solid var(--line);border-radius:14px;padding:12px 14px;
  font-weight:700;color:var(--ink);cursor:grab;
  display:flex;flex-direction:column;gap:8px;
  transition:transform .12s, border-color .12s, box-shadow .15s;
}
.card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 10px rgba(160,110,60,.1)}
.card.sortable-chosen{opacity:.55;cursor:grabbing}
.card.sortable-ghost{opacity:.3;background:#fffbe9}
.card.goal{border-color:var(--sun);background:#fffbe9}

/* card content unified */
.card .c-head{display:flex;align-items:center;gap:8px;font-family:var(--display-font);font-weight:600;color:var(--soft);font-size:.82rem}
.card .c-head .ic{font-size:1.2rem;color:var(--ink)}
.card .c-head .c-meta{flex:1;letter-spacing:.02em}
.card .c-title{font-weight:800;font-size:1rem;color:var(--ink);line-height:1.3}
.card .c-tags{display:flex;flex-wrap:wrap;gap:6px}
.card .c-tags:empty{display:none}
.card .c-footer{margin-top:auto;padding-top:6px;display:flex;flex-wrap:wrap;gap:8px}
.card .c-footer:empty{display:none}
.tag.goal-tag{background:var(--sun);color:#5a4300}

/* Doing column — make cards stand out */
.col[data-col="doing"] .card{
  border-color:var(--accent);border-width:3px;
  box-shadow:var(--shadow-doing);
  background:#fff;
}
.col[data-col="doing"] .card::before{
  content:"⚡";position:absolute;top:-12px;left:-10px;
  background:var(--accent);color:#fff;border-radius:50%;
  width:30px;height:30px;display:grid;place-items:center;font-size:1.1rem;
  box-shadow:0 3px 8px rgba(232,73,42,.4);z-index:2;
}
.col[data-col="done"] .card{opacity:.88}

/* ===== footer actions ===== */
.footer-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:30px}
.btn{
  font-family:var(--display-font);font-weight:var(--display-weight);border:none;border-radius:var(--radius-btn);cursor:pointer;
  padding:14px 26px;font-size:1.05rem;color:#fff;background:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:8px;
  box-shadow:0 8px 20px rgba(232,73,42,.35);transition:transform .15s;
}
.btn:hover{transform:translateY(-2px)}
.btn.ghost{background:#fff;color:var(--ink);border:2.5px solid var(--line);box-shadow:var(--shadow)}
.btn.teal{background:var(--teal);box-shadow:0 8px 20px rgba(31,181,163,.35)}

/* ===== day-complete modal + confetti + balloons ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:none;align-items:flex-start;justify-content:center;
  z-index:200;padding:20px;overflow:y-auto;
}
.modal-overlay.show{display:flex;animation:backdropIn .3s ease}
.modal{
  background:var(--card);border-radius:var(--radius-card);
  padding:36px 32px;max-width:520px;width:100%;text-align:center;
  position:relative;animation:modalDrop .55s cubic-bezier(.2,.9,.3,1.2);
  box-shadow:0 24px 60px rgba(0,0,0,.3);margin-top:8vh;
}
@keyframes modalDrop{from{transform:translateY(-300px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes backdropIn{from{opacity:0}to{opacity:1}}
.modal-close{
  position:absolute;top:10px;right:10px;background:none;border:none;
  font-size:24px;cursor:pointer;width:36px;height:36px;border-radius:50%;
  color:var(--soft);
}
.modal-close:hover{background:var(--line)}
.modal h2{font-family:var(--display-font);font-weight:var(--display-weight);font-size:2.2rem;margin:0 0 14px}
.modal p{font-size:1.05rem;font-weight:700;color:var(--soft);margin:0 0 22px;line-height:1.5}
.modal .modal-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

.balloons{position:fixed;left:0;right:0;bottom:0;top:0;pointer-events:none;z-index:150;overflow:hidden}
.balloon{position:absolute;font-size:3rem;bottom:-60px;animation:floatUp 5s ease-in forwards}
.balloon:nth-child(1){left:8%;animation-delay:.1s}
.balloon:nth-child(2){left:24%;animation-delay:.5s}
.balloon:nth-child(3){left:42%;animation-delay:.2s;font-size:2.4rem}
.balloon:nth-child(4){left:60%;animation-delay:.7s}
.balloon:nth-child(5){left:78%;animation-delay:.3s;font-size:2.7rem}
.balloon:nth-child(6){left:92%;animation-delay:.55s}
@keyframes floatUp{
  from{transform:translateY(0) rotate(0);opacity:1}
  to{transform:translateY(-110vh) rotate(20deg);opacity:0}
}

/* ===== toast ===== */
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;font-weight:800;border-radius:14px;padding:12px 18px;box-shadow:0 8px 20px rgba(0,0,0,.2);opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;z-index:50;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

.state-msg{text-align:center;padding:60px 20px;color:var(--soft);font-weight:700}
.state-msg h2{font-family:var(--display-font);font-weight:var(--display-weight);color:var(--ink);margin:0 0 10px}

@keyframes drop{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:none}}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.35)}
  50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}
}

/* ===== per-kid themes ===== */
body.theme-gage{
  --accent:#ff5a36;
  --accent-deep:#c2330f;
  --grape:#2563eb;
  --radius-card:14px;
  --radius-btn:10px;
  --display-font:'Fredoka';
  --display-weight:700;
  background:
    radial-gradient(1200px 580px at 50% -8%, rgba(255,90,54,.42), transparent 60%),
    radial-gradient(900px 540px at 110% 10%, rgba(37,99,235,.18), transparent 55%),
    radial-gradient(800px 540px at -10% 30%, rgba(31,181,163,.15), transparent 55%),
    var(--bg);
}
body.theme-siena{
  --accent:#ec4899;
  --accent-deep:#be185d;
  --grape:#a78bfa;
  --sun:#ffd166;
  --radius-card:28px;
  --radius-btn:999px;
  --display-font:'Quicksand';
  --display-weight:600;
  background:
    radial-gradient(1200px 580px at 50% -8%, rgba(236,72,153,.34), transparent 60%),
    radial-gradient(900px 540px at 110% 10%, rgba(167,139,250,.22), transparent 55%),
    radial-gradient(800px 540px at -10% 30%, rgba(31,181,163,.18), transparent 55%),
    var(--bg);
}

/* ===== responsive ===== */
@media (max-width:900px){
  .header-card{grid-template-columns:auto 1fr;gap:18px}
  .prog-ring-wrap{grid-column:1 / -1;flex-direction:row;gap:14px;justify-content:center;padding-top:8px;border-top:1px dashed var(--line)}
  .prog-ring{width:72px;height:72px}
}
@media (max-width:720px){
  body{padding:18px 14px 80px}
  .header-card{grid-template-columns:1fr;text-align:center}
  .date-tile{margin:0 auto}
  h1{justify-content:center}
  .kanban{grid-template-columns:1fr}
  .col{min-height:auto}
  .modal{padding:24px 18px;margin-top:5vh}
  .modal h2{font-size:1.8rem}
}

/* ===== print ===== */
@media print{
  body{background:#fff;padding:20px;color:#000}
  .footer-actions, .help-btn, .toast, #now-display, .modal-overlay, .balloons{display:none !important}
  .anchor.current, .anchor.next{animation:none}
  .anchor.current::before, .anchor.next::before{display:none}
  .card, .anchor{break-inside:avoid;cursor:default;box-shadow:none !important}
  .col{border:none;background:transparent;padding:0}
  .col[data-col="doing"] .card::before{display:none}
  .kanban{grid-template-columns:1fr;gap:0}
  .col h3{margin-top:14px}
}
</style>
</head>
<body>
<div class="wrap" id="root">
  <div class="state-msg" id="loading">
    <h2>Loading today's plan&hellip;</h2>
    <p>Hold tight</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="day-complete-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeDayCompleteModal()" aria-label="Close">&times;</button>
    <h2>🎉 You did it!</h2>
    <p>You finished everything today. Amazing work.<br>Send Dad your wrap-up so he can celebrate with you!</p>
    <div class="modal-actions">
      <button class="btn" onclick="sendWrapUp()">📧 Send my day to Dad</button>
      <button class="btn ghost" onclick="closeDayCompleteModal()">I'll send it later</button>
    </div>
  </div>
</div>

<div class="balloons" id="balloons" aria-hidden="true"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.9.2/confetti.browser.min.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const kid = (params.get("kid") || "").toLowerCase();
const date = params.get("date") || todayISO();
const root = document.getElementById("root");
let dayData = null;
let cardState = {};
let stateKey = "";
let lastBlockedToast = 0;

const RING_CIRC = 2 * Math.PI * 42;

function todayISO(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function fmt12(t24){
  if(!t24 || !t24.includes(":")) return t24 || "";
  const parts = t24.split(":");
  let h = parseInt(parts[0],10);
  const m = parts[1];
  const period = h >= 12 ? "PM" : "AM";
  if(h === 0) h = 12;
  else if(h > 12) h -= 12;
  return h + ":" + m + " " + period;
}
function fmt12Now(d){
  let h = d.getHours();
  const m = String(d.getMinutes()).padStart(2,"0");
  const period = h >= 12 ? "PM" : "AM";
  if(h === 0) h = 12;
  else if(h > 12) h -= 12;
  return h + ":" + m + " " + period;
}
function parseTimeToMin(t){
  if(!t || !t.includes(":")) return -1;
  const parts = t.split(":");
  return parseInt(parts[0],10) * 60 + parseInt(parts[1],10);
}
function parseDateTile(dateStr){
  if(!dateStr || !/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return null;
  const parts = dateStr.split("-").map(Number);
  const d = new Date(parts[0], parts[1]-1, parts[2]);
  return {
    dow: d.toLocaleDateString("en-US",{weekday:"short"}).toUpperCase(),
    num: parts[2],
    mon: d.toLocaleDateString("en-US",{month:"short"}).toUpperCase()
  };
}

function toast(msg, ms){
  ms = ms || 2200;
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, ms);
}

function errorScreen(title, sub){
  root.innerHTML = '<div class="state-msg"><h2>'+title+'</h2><p>'+(sub||"")+'</p>'+
    '<p style="margin-top:20px"><a class="btn ghost" href="index.html">&#8634; Back to picker</a></p></div>';
}

if(!kid || !["gage","siena"].includes(kid)){
  errorScreen("Hmm, whose day is this?", "Try opening from the picker so we know which kid.");
} else {
  document.body.classList.add("theme-"+kid);
  stateKey = "dayState:"+date+":"+kid;
  loadDay();
}

async function loadDay(){
  try{
    const res = await fetch("days/"+date+"/"+kid+".json", {cache:"no-store"});
    if(!res.ok) throw new Error("not found");
    dayData = await res.json();
    cardState = loadState();
    render();
    highlightCurrentAnchor();
    setInterval(highlightCurrentAnchor, 30000);
  } catch(e){
    errorScreen("No plan for today yet", "Ask Dad to build today's day. ("+date+")");
  }
}

function loadState(){
  try{
    const raw = localStorage.getItem(stateKey);
    return raw ? JSON.parse(raw) : {};
  } catch(e){ return {}; }
}
function saveState(){
  try{ localStorage.setItem(stateKey, JSON.stringify(cardState)); } catch(e){}
}

function render(){
  const kidEmojis = { gage:"🚀", siena:"🌸" };
  const goal = dayData.dailyGoal || {};
  const anchors = dayData.anchors || [];
  const items = dayData.workItems || [];
  const tile = parseDateTile(dayData.date || date);

  let html = '';

  // header card
  html += '<div class="header-card">';
  if(tile){
    html += '<div class="date-tile"><div class="dt-dow">'+tile.dow+'</div><div class="dt-num">'+tile.num+'</div><div class="dt-mon">'+tile.mon+'</div></div>';
  }
  html += '<div class="header-text">';
  html += '<div class="kicker">Today’s plan</div>';
  html += '<h1><span class="kemoji">'+kidEmojis[kid]+'</span> '+cap(kid)+'’s day</h1>';
  html += '<div class="subtitle">'+esc(dayData.displayDate || date)+(dayData.weekNumber? '<span class="wknum">Week '+dayData.weekNumber+'</span>' : '')+'</div>';
  html += '</div>';
  // circular progress
  html += '<div class="prog-ring-wrap">';
  html += '<svg class="prog-ring" viewBox="0 0 100 100">';
  html += '<circle class="ring-bg" cx="50" cy="50" r="42" fill="none" stroke-width="8"/>';
  html += '<circle class="ring-fill" cx="50" cy="50" r="42" fill="none" stroke-width="8" stroke-linecap="round" stroke-dasharray="'+RING_CIRC.toFixed(2)+'" stroke-dashoffset="'+RING_CIRC.toFixed(2)+'" transform="rotate(-90 50 50)" id="ring-fill-el"/>';
  html += '<text x="50" y="56" text-anchor="middle" font-size="20" id="ring-pct">0%</text>';
  html += '</svg>';
  html += '<div class="prog-ring-label">Today</div>';
  html += '</div>';
  html += '</div>';

  // goal
  if(goal.headline){
    html += '<div class="goal-card" id="goal-card">';
    html += '<div class="goal-label">🎯 Today’s goal</div>';
    html += '<div class="goal-headline">'+esc(goal.headline)+'</div>';
    if(goal.explainer) html += '<div class="goal-explainer">'+esc(goal.explainer)+'</div>';
    if(goal.starterIdea){
      html += '<div class="starter-idea"><span class="si-label">💡 Starter idea</span><span class="si-body">'+esc(goal.starterIdea)+'</span></div>';
    }
    if(dayData.theme){
      html += '<div class="theme-chip">today’s theme: '+esc(dayData.theme)+'</div>';
    }
    html += '</div>';
  }

  // anchors
  if(anchors.length){
    html += '<section class="section">';
    html += '<div class="h2-row"><h2>⏰ Today’s anchors</h2><span id="now-display"></span></div>';
    html += '<p class="hint">These happen at their time — just check them off when done.</p>';
    html += '<div class="progress"><div class="bar"><div class="bar-fill" id="anchor-bar"></div></div><span class="label" id="anchor-label">0 of '+anchors.length+' done</span></div>';
    html += '<div class="anchor-grid">'+anchors.map(renderAnchor).join("")+'</div>';
    html += '</section>';
  }

  // work items
  if(items.length){
    html += '<section class="section">';
    html += '<h2>🛠️ What to work on</h2>';
    html += '<p class="hint">Drag a card from <strong>To do</strong> to <strong>Doing now</strong> when you start it. Move it to <strong>Done</strong> when you finish. One at a time — go through Doing!</p>';
    html += '<div class="progress"><div class="bar"><div class="bar-fill" id="work-bar"></div></div><span class="label" id="work-label">0 of '+items.length+' done</span></div>';
    html += '<div class="kanban">';
    html += '<div class="col" data-col="todo"><h3>📋 To do</h3><div class="col-body" id="col-todo"></div></div>';
    html += '<div class="col" data-col="doing"><h3>⚡ Doing now</h3><div class="col-body" id="col-doing"></div></div>';
    html += '<div class="col" data-col="done"><h3>✅ Done</h3><div class="col-body" id="col-done"></div></div>';
    html += '</div></section>';
  }

  html += '<div class="footer-actions">';
  html += '<button class="btn ghost" onclick="window.print()">🖨️ Print</button>';
  html += '<button class="btn ghost" onclick="resetDay()">↻ Reset day</button>';
  html += '<a class="btn ghost" href="index.html?kid='+kid+'">↺ Build a new day</a>';
  html += '</div>';

  root.innerHTML = html;

  // place cards
  items.forEach(function(item){
    const col = cardState[item.id] || "todo";
    document.getElementById("col-"+col).insertAdjacentHTML("beforeend", renderCard(item));
  });

  // wire anchors
  document.querySelectorAll(".anchor").forEach(function(a){
    const id = a.dataset.id;
    if(cardState["anchor:"+id] === "done") a.classList.add("done");
    a.addEventListener("click", function(e){
      if(e.target.closest("a") || e.target.closest("button")) return;
      a.classList.toggle("done");
      cardState["anchor:"+id] = a.classList.contains("done") ? "done" : "todo";
      saveState();
      updateProgress();
    });
  });

  setupKanban();
  updateProgress();
  checkSignoffUnlock();
}

function renderAnchor(a){
  const tags = [];
  if(a.sharedWith) tags.push('<span class="tag">with '+esc(a.sharedWith)+'</span>');
  if(a.withDad && !a.sharedWith) tags.push('<span class="tag">with Dad</span>');
  const time = (a.time && a.endTime) ? fmt12(a.time)+' – '+fmt12(a.endTime) : (a.time ? fmt12(a.time) : '');
  const footerBtns = [];
  if(a.meetUrl) footerBtns.push('<a class="link-btn" href="'+esc(a.meetUrl)+'" target="_blank" rel="noopener">Join Meet</a>');
  else if(a.link) footerBtns.push('<a class="link-btn" href="'+esc(a.link)+'" target="_blank" rel="noopener">'+esc(a.linkLabel||"Open")+'</a>');
  return '<div class="anchor" data-id="'+esc(a.id)+'">'+
    '<div class="a-head"><span class="ic">'+esc(a.icon||"•")+'</span><span class="a-time">'+esc(time)+'</span><span class="check"></span></div>'+
    '<div class="a-title">'+esc(a.label)+'</div>'+
    (tags.length ? '<div class="a-tags">'+tags.join("")+'</div>' : '')+
    (footerBtns.length ? '<div class="a-footer">'+footerBtns.join("")+'</div>' : '')+
    '</div>';
}

function renderCard(item){
  const tags = [];
  if(item.isDailyGoal) tags.push('<span class="tag goal-tag">daily goal</span>');
  if(item.sharedWith) tags.push('<span class="tag">with '+esc(item.sharedWith)+'</span>');
  const meta = item.estimatedTime ? '≈ '+esc(item.estimatedTime) : '';
  const linkAttr = item.link && item.link.startsWith("http") ? ' target="_blank" rel="noopener"' : '';
  const footerBtns = [];
  if(item.link) footerBtns.push('<a class="link-btn" href="'+esc(item.link)+'"'+linkAttr+'>'+esc(item.linkLabel||"Open")+'</a>');
  const safeLabel = String(item.label||"").replace(/'/g,"\\'");
  footerBtns.push('<button class="help-btn" onclick="askHelp(\''+esc(item.id)+'\',\''+safeLabel+'\')">I’m stuck</button>');
  const goalCls = item.isDailyGoal ? ' goal' : '';
  return '<div class="card'+goalCls+'" data-id="'+esc(item.id)+'">'+
    '<div class="c-head"><span class="ic">'+esc(item.icon||"•")+'</span><span class="c-meta">'+meta+'</span></div>'+
    '<div class="c-title">'+esc(item.label)+'</div>'+
    (tags.length ? '<div class="c-tags">'+tags.join("")+'</div>' : '')+
    '<div class="c-footer">'+footerBtns.join("")+'</div>'+
    '</div>';
}

function isValidKanbanMove(from, to){
  if(from === to) return true;
  return (from === "todo"  && to === "doing") ||
         (from === "doing" && to === "todo")  ||
         (from === "doing" && to === "done")  ||
         (from === "done"  && to === "doing");
}

function onMoveHandler(evt){
  const from = evt.from.id.replace("col-","");
  const to = evt.to.id.replace("col-","");
  const valid = isValidKanbanMove(from, to);
  if(!valid){
    const now = Date.now();
    if(now - lastBlockedToast > 1500){
      lastBlockedToast = now;
      if(from === "todo" && to === "done") toast("Move it to Doing first! One step at a time.");
      else if(from === "done" && to === "todo") toast("Move it back through Doing first.");
      else toast("Can’t skip steps — go through Doing.");
    }
  }
  return valid;
}

function setupKanban(){
  ["todo","doing","done"].forEach(function(colName){
    const el = document.getElementById("col-"+colName);
    Sortable.create(el, {
      group:"kanban",
      animation:160,
      onMove: onMoveHandler,
      onAdd: function(evt){ handleMove(evt, colName); },
      onUpdate: function(evt){ handleMove(evt, colName); }
    });
  });
}

function handleMove(evt, destCol){
  const cardEl = evt.item;
  const id = cardEl.dataset.id;

  if(destCol === "doing"){
    const doingBody = document.getElementById("col-doing");
    const others = Array.from(doingBody.children).filter(function(c){ return c.dataset.id !== id; });
    if(others.length > 0){
      const bumped = others[0];
      document.getElementById("col-todo").appendChild(bumped);
      cardState[bumped.dataset.id] = "todo";
      toast('One thing at a time — "'+labelOf(bumped.dataset.id)+'" went back to To do');
    }
  }

  cardState[id] = destCol;
  saveState();
  updateProgress();
  checkSignoffUnlock();

  if(destCol === "done") cardEl.animate(
    [{transform:"scale(1)"},{transform:"scale(1.04)"},{transform:"scale(1)"}],
    {duration:280, easing:"ease-out"}
  );
}

function labelOf(id){
  const it = (dayData.workItems||[]).find(function(x){ return x.id===id; });
  return it ? it.label : id;
}

function updateProgress(){
  const items = dayData.workItems || [];
  const anchors = dayData.anchors || [];
  const workDone = items.filter(function(i){ return cardState[i.id] === "done"; }).length;
  const anchorDone = anchors.filter(function(a){ return cardState["anchor:"+a.id] === "done"; }).length;

  const workBar = document.getElementById("work-bar");
  const workLabel = document.getElementById("work-label");
  if(workBar) workBar.style.width = (items.length ? (workDone/items.length)*100 : 0)+"%";
  if(workLabel) workLabel.textContent = workDone+" of "+items.length+" done";

  const anchorBar = document.getElementById("anchor-bar");
  const anchorLabel = document.getElementById("anchor-label");
  if(anchorBar) anchorBar.style.width = (anchors.length ? (anchorDone/anchors.length)*100 : 0)+"%";
  if(anchorLabel) anchorLabel.textContent = anchorDone+" of "+anchors.length+" done";

  // ring shows overall combined progress
  const total = items.length + anchors.length;
  const done = workDone + anchorDone;
  const pct = total ? Math.round((done/total)*100) : 0;
  const ringFill = document.getElementById("ring-fill-el");
  const ringPct = document.getElementById("ring-pct");
  if(ringFill) ringFill.setAttribute("stroke-dashoffset", (RING_CIRC * (1 - pct/100)).toFixed(2));
  if(ringPct) ringPct.textContent = pct+"%";

  // goal completion state
  const goalItem = (items).find(function(i){ return i.isDailyGoal; });
  const goalCard = document.getElementById("goal-card");
  if(goalCard && goalItem){
    if(cardState[goalItem.id] === "done") goalCard.classList.add("completed");
    else goalCard.classList.remove("completed");
  }
}

function checkSignoffUnlock(){
  const items = dayData.workItems || [];
  const anchors = dayData.anchors || [];
  const allWorkDone = items.length > 0 && items.every(function(i){ return cardState[i.id] === "done"; });
  if(allWorkDone && !cardState["_completeShown"]){
    cardState["_completeShown"] = true;
    saveState();
    showDayCompleteModal();
  }
}

function showDayCompleteModal(){
  const modal = document.getElementById("day-complete-modal");
  modal.classList.add("show");
  // balloons
  const bWrap = document.getElementById("balloons");
  bWrap.innerHTML = '<span class="balloon">🎈</span><span class="balloon">🎈</span><span class="balloon">🎉</span><span class="balloon">🎈</span><span class="balloon">⭐</span><span class="balloon">🎈</span>';
  // confetti
  if(typeof confetti === "function"){
    const end = Date.now() + 1600;
    (function frame(){
      confetti({particleCount:5, angle:60, spread:55, origin:{x:0, y:0.7}, colors:["#ff6b4a","#1fb5a3","#ffc73a","#7b6cf6","#ec4899"]});
      confetti({particleCount:5, angle:120, spread:55, origin:{x:1, y:0.7}, colors:["#ff6b4a","#1fb5a3","#ffc73a","#7b6cf6","#ec4899"]});
      if(Date.now() < end) requestAnimationFrame(frame);
    })();
  }
  // clear balloons after animation
  setTimeout(function(){ bWrap.innerHTML = ""; }, 5500);
}
function closeDayCompleteModal(){
  document.getElementById("day-complete-modal").classList.remove("show");
}

function resetDay(){
  if(!confirm("Reset everything for today? All your checks and progress will be cleared.")) return;
  try{ localStorage.removeItem(stateKey); } catch(e){}
  window.location.reload();
}

function sendWrapUp(){
  const dadEmail = "kevin.webwithus+kids@gmail.com";
  const subject = cap(kid)+"’s wrap-up — "+(dayData.displayDate || date);
  const body = "Hi Dad!\n\nI finished my whole day today! 🎉\n\nHere’s how it went:\n\n"+
               "What went really well today?\n→ \n\n"+
               "Something I want to try tomorrow:\n→ \n\n"+
               "Did I earn any bonus rewards?\n→ \n\n"+
               "Love,\n"+cap(kid);
  window.location.href = "mailto:"+encodeURIComponent(dadEmail)+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body);
  closeDayCompleteModal();
}

function highlightCurrentAnchor(){
  if(!dayData) return;
  const now = new Date();
  const nowDisplay = document.getElementById("now-display");
  if(nowDisplay) nowDisplay.textContent = "🕒 Right now: " + fmt12Now(now);

  if(date !== todayISO()){
    document.querySelectorAll(".anchor").forEach(function(el){
      el.classList.remove("current"); el.classList.remove("next");
    });
    return;
  }

  const nowMin = now.getHours()*60 + now.getMinutes();
  const anchors = dayData.anchors || [];
  let currentId = null, nextId = null;
  for(let i=0;i<anchors.length;i++){
    const a = anchors[i];
    const s = parseTimeToMin(a.time);
    const e = parseTimeToMin(a.endTime);
    if(s>=0 && e>=0 && nowMin>=s && nowMin<e){
      currentId = a.id;
      break;
    }
    if(s>=0 && nowMin<s && nextId===null){
      nextId = a.id;
    }
  }
  document.querySelectorAll(".anchor").forEach(function(el){
    const id = el.dataset.id;
    el.classList.toggle("current", id === currentId);
    el.classList.toggle("next", id === nextId && currentId === null);
  });
}

function askHelp(itemId, label){
  const dadEmail = "kevin.webwithus+kids@gmail.com";
  const subject = cap(kid)+" needs help with: "+label;
  const body = "Hi Dad,\n\nI’m stuck on: "+label+"\n\nCan you help me when you can?\n\n— "+cap(kid);
  const url = "mailto:"+encodeURIComponent(dadEmail)+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body);
  window.location.href = url;
}

function cap(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : ""; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, function(c){ return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]; }); }
</script>
